[advisories]
yanked = "deny"

[bans]
multiple-versions = "allow"
wildcards = "deny"

[licenses]
allow = [
	"Apache-2.0",
	"Apache-2.0 WITH LLVM-exception",
	"BSD-2-Clause",
	"BSD-3-Clause",
	"BSL-1.0",
	"CC0-1.0",
	"CDLA-Permissive-2.0",
	"ISC",
	"MIT",
	"MIT-0",
	"Unicode-3.0",
	"Unlicense",
	"Zlib",
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
